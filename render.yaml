services:
  - type: web
    name: vera
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    preDeployCommand: npm run server:pg:migrate:deploy && npm run server:pg:seed
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: ""
      - key: ALLOW_DEMO_HEADER
        value: "false"
      - key: ALLOW_DESTRUCTIVE_SEED
        value: "false"
      - key: STORAGE_ADAPTER
        value: local
      - key: ACCEPT_LOCAL_STORAGE_IN_PRODUCTION
        value: "true"
      - key: STORAGE_LOCAL_DIR
        value: ""
      - key: STORAGE_LOCAL_PUBLIC_BASE_URL
        value: ""
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com
      - key: IIKO_ADAPTER
        value: mock
      - key: IIKO_BASE_URL
        value: https://api-ru.iiko.services
      - key: IIKO_API_LOGIN
        value: ""
      - key: IIKO_ORGANIZATION_ID
        value: ""
