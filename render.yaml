services:
  - type: web
    name: vera
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    # NOTE: preDeployCommand is a paid-plan feature. On the free plan, run
    # migrations + seed manually once against the Postgres:
    #   DATABASE_URL=... npm run server:pg:migrate:deploy
    #   DATABASE_URL=... npm run server:pg:seed
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: ""
      - key: ALLOW_DEMO_HEADER
        value: "false"
      - key: ALLOW_DESTRUCTIVE_SEED
        value: "false"
      - key: STORAGE_ADAPTER
        value: s3
      # Supabase Storage (S3-compatible). Fill these in the Render dashboard.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com
      - key: IIKO_ADAPTER
        value: mock
      - key: IIKO_BASE_URL
        value: https://api-ru.iiko.services
      - key: IIKO_API_LOGIN
        value: ""
      - key: IIKO_ORGANIZATION_ID
        value: ""
